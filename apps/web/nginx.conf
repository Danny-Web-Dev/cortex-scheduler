server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Same-origin proxy to the API container — mirrors the Vite dev proxy
  # (apps/web/vite.config.ts) and the production Vercel rewrite, so the
  # browser only ever talks to this origin (first-party cookies, no CORS).
  location /api/ {
    proxy_pass http://api:3000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback for client-side routing (react-router-dom).
  location / {
    try_files $uri /index.html;
  }
}
