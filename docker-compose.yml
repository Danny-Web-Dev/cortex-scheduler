services:
  mysql:
    image: mysql:8.4
    container_name: cortex-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-cortex_dev_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cortex}
    ports:
      - '${MYSQL_PORT:-3306}:3306'
    volumes:
      - cortex_mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          'localhost',
          '-p${MYSQL_ROOT_PASSWORD:-cortex_dev_root}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: cortex-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-do-not-use-in-prod}
      CLINIC_TZ: ${CLINIC_TZ:-Asia/Jerusalem}
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-cortex_dev_root}@mysql:3306/${MYSQL_DATABASE:-cortex}
    expose:
      - '3000'
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: cortex-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '${WEB_PORT:-8080}:80'

volumes:
  cortex_mysql_data:
